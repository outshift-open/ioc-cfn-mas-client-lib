apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: cfn-a2a-sidecar
  namespace: a2a-demo
spec:
  workloadSelector:
    labels:
      cfn/a2a-sidecar: enabled
  configPatches:
  # OUTBOUND: Sender-side interception (Agent A → Agent B)
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_OUTBOUND
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.ext_authz
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
          transport_api_version: V3
          grpc_service:
            envoy_grpc:
              cluster_name: ext_authz_cluster
            timeout: 5s
          with_request_body:
            max_request_bytes: 8192
            allow_partial_message: true
          failure_mode_allow: true  # Demo: fail-open for easy testing. Production: set to false for security.

  # INBOUND: Receiver-side interception (Agent B receives from Agent A)
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.ext_authz
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
          transport_api_version: V3
          grpc_service:
            envoy_grpc:
              cluster_name: ext_authz_cluster
            timeout: 5s
          with_request_body:
            max_request_bytes: 8192
            allow_partial_message: true
          failure_mode_allow: true  # Demo: fail-open for easy testing. Production: set to false for security.

  # Add ext_authz cluster (shared by both OUTBOUND and INBOUND)
  - applyTo: CLUSTER
    patch:
      operation: ADD
      value:
        name: ext_authz_cluster
        connect_timeout: 1s
        type: STATIC
        http2_protocol_options: {}
        load_assignment:
          cluster_name: ext_authz_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 9001
