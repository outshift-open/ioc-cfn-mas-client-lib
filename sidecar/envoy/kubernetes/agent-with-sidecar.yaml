apiVersion: v1
kind: Pod
metadata:
  name: agent-with-a2a-sidecar
  labels:
    app: my-agent
    a2a-sidecar: enabled
  annotations:
    sidecar.istio.io/inject: "true"  # Istio handles iptables automatically
spec:
  containers:
  # Main agent container - COMPLETELY UNCHANGED!
  - name: agent
    image: my-agent:latest
    ports:
    - containerPort: 8000
    # NO HTTP_PROXY environment variable!
    # NO configuration changes at all!
    # Agent is completely agnostic to the sidecar

  # A2A Sidecar container (Envoy + ext_authz)
  - name: a2a-sidecar
    image: a2a-sidecar:latest
    ports:
    - containerPort: 15001
      name: envoy-inbound
    - containerPort: 15002
      name: envoy-outbound
    - containerPort: 9901
      name: envoy-admin
    env:
    - name: CFN_URL
      value: "http://cfn-api.cfn-system.svc.cluster.local:9002"
    - name: WORKSPACE_ID
      value: "my-workspace"
    - name: MAS_ID
      value: "my-mas"
    securityContext:
      runAsUser: 1337  # Envoy user

---
apiVersion: v1
kind: Service
metadata:
  name: my-agent
spec:
  selector:
    app: my-agent
  ports:
  - name: http
    port: 8000
    targetPort: 8000
