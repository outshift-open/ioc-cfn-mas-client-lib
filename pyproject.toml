# pyproject.toml

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ioc_cfn_mas_client_lib"
version = "0.1.0"
description = "Python SDK client library for IOC CFN MAS."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "samuyang_cisco" }]
dependencies = [
  "pydantic>=2.5",
  "urllib3>=1.26",
  "python-dateutil>=2.8",
  "typing-extensions>=4.7",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
  "pytest-cov>=4.1",
  "ruff>=0.4",
  "mypy>=1.8",
]
examples = [
  "python-dotenv>=1.0",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["ioc_cfn_mas_client*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py39"
exclude = [
  "src/generated",  # Exclude auto-generated OpenAPI code
]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
  "^src/generated/",  # Exclude auto-generated OpenAPI code
]
