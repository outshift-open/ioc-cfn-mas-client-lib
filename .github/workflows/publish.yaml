# =============================================================================
# Publish to PyPI — Triggered on version tags (e.g. v0.1.0)
# =============================================================================
#
# This workflow builds and publishes ioc-cfn-mas-client-lib to PyPI.
#
# HOW TO RELEASE:
#   1. Update version in pyproject.toml (e.g. version = "0.1.1")
#   2. Update CHANGELOG.md with release notes
#   3. Commit and push to main
#   4. Tag the commit:  git tag v0.1.1
#   5. Push the tag:    git push origin v0.1.1
#   6. This workflow runs automatically and publishes the package
#
# PYPI SETUP (one-time):
#   Go to https://pypi.org → Account → Publishing → Add publisher
#     - Package name:    ioc-cfn-mas-client-lib
#     - Owner:           outshift-open
#     - Repository:      ioc-cfn-mas-client-lib
#     - Workflow name:   publish.yaml
#     - Environment:     (leave blank)
#
# AFTER PUBLISH, users install with:
#   pip install ioc-cfn-mas-client-lib
#
# =============================================================================

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  # Job 1: Run full test suite before publishing
  test:
    name: Run Tests Before Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          clean: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: uv run pytest

      - name: Test import
        run: |
          uv run python -c "from ioc_cfn_mas_client import Client; print('✓ Import successful')"

  # Job 2: Build and verify package
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Build distribution packages
        run: |
          python -m build
          echo "✓ Build complete"
          ls -lh dist/

      - name: Check distribution packages
        run: |
          python -m twine check dist/*
          echo "✓ Distribution check passed"

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile
          import glob
          whl = glob.glob('dist/*.whl')[0]
          print(f'\n📦 Contents of {whl}:')
          with zipfile.ZipFile(whl) as z:
              for name in sorted(z.namelist())[:20]:
                  print(f'  {name}')
              if len(z.namelist()) > 20:
                  print(f'  ... and {len(z.namelist()) - 20} more files')
          "

      - name: Test wheel installation
        run: |
          python -m venv /tmp/test-env
          /tmp/test-env/bin/pip install dist/*.whl
          /tmp/test-env/bin/python -c "from ioc_cfn_mas_client import Client; print('✓ Wheel install successful')"
          rm -rf /tmp/test-env

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 5

  # Job 3: Publish to PyPI (only on version tags)
  publish:
    name: Publish to PyPI
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      # Safety check: tag must match pyproject.toml version
      - name: Validate tag matches pyproject version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          TAG_VERSION="${TAG_NAME#v}"

          echo "Git tag: $TAG_NAME"
          echo "Normalized tag version: $TAG_VERSION"

          export TAG_VERSION

          python <<'EOF'
          import os
          import sys
          import tomllib

          tag_version = os.environ["TAG_VERSION"]

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          pyproject_version = data["project"]["version"]

          print(f"pyproject.toml version: {pyproject_version}")
          print(f"tag version: {tag_version}")

          if pyproject_version != tag_version:
              print(
                  f"❌ Version mismatch: pyproject.toml has '{pyproject_version}' but Git tag is '{tag_version}'",
                  file=sys.stderr
              )
              sys.exit(1)

          print("✓ Version validation passed")
          EOF

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: List distributions to publish
        run: ls -lh dist/

      # Publish to PyPI using trusted publishing (OIDC)
      # No API token needed - GitHub mints a short-lived token that PyPI trusts
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
