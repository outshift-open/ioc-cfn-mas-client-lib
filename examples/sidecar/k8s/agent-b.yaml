apiVersion: v1
kind: Service
metadata:
  name: agent-b
  namespace: a2a-demo
spec:
  selector:
    app: agent-b
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-b
  namespace: a2a-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-b
  template:
    metadata:
      labels:
        app: agent-b
        cfn/a2a-sidecar: enabled  # EnvoyFilter selector
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: agent-b
        image: agent-b:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
      - name: ext-authz
        image: ext-authz-only:latest
        imagePullPolicy: Never
        env:
        - name: CFN_URL
          value: "http://mock-cfn.a2a-demo.svc.cluster.local:9002"
        - name: WORKSPACE_ID
          value: "demo-workspace"
        - name: MAS_ID
          value: "demo-mas"
        ports:
        - name: ext-authz
          containerPort: 9001
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 9001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 9001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
