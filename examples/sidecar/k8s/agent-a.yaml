apiVersion: v1
kind: Service
metadata:
  name: agent-a
  namespace: a2a-demo
spec:
  selector:
    app: agent-a
  ports:
  - port: 8001
    targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-a
  namespace: a2a-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-a
  template:
    metadata:
      labels:
        app: agent-a
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: agent-a
        image: agent-a:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
      - name: a2a-sidecar
        image: a2a-sidecar:latest
        imagePullPolicy: Never
        env:
        - name: CFN_URL
          value: "http://mock-cfn.a2a-demo.svc.cluster.local:9002"
        - name: WORKSPACE_ID
          value: "demo-workspace"
        - name: MAS_ID
          value: "demo-mas"
        ports:
        - name: ext-authz
          containerPort: 9001
          protocol: TCP
        - name: envoy-admin
          containerPort: 9901
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 9001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 9001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
